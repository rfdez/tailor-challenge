name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest

    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 📜 Format
        run: npm run format:check

  test:
    name: 🧪 Test and build
    runs-on: ubuntu-latest

    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🛠️ Build
        run: npm run build

      - name: 🧪 Test
        run: npm run test:ci
